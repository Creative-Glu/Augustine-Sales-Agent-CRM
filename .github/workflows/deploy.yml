name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.deploy-url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_EXECUTION_DB_URL: ${{ secrets.NEXT_PUBLIC_EXECUTION_DB_URL }}
          NEXT_PUBLIC_EXECUTION_DB_ANON_KEY: ${{ secrets.NEXT_PUBLIC_EXECUTION_DB_ANON_KEY }}
          NEXT_PUBLIC_FILE_UPLOAD_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_FILE_UPLOAD_SUPABASE_URL }}
          NEXT_PUBLIC_FILE_UPLOAD_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_FILE_UPLOAD_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
          NEXT_PUBLIC_APP_NAME: ${{ secrets.NEXT_PUBLIC_APP_NAME }}

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: .next
          production-deploy: true
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
