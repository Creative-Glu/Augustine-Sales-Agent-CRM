name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run lint

      - run: npm run test -- --run

      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_EXECUTION_DB_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_EXECUTION_DB_ANON_KEY: placeholder
          NEXT_PUBLIC_FILE_UPLOAD_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_FILE_UPLOAD_SUPABASE_ANON_KEY: placeholder
          NEXT_PUBLIC_API_URL: http://localhost:8000/
          NEXT_PUBLIC_APP_NAME: Augustine CRM
